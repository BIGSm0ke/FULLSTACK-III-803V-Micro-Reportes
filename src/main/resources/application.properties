# Configuración del Servidor
server.port=8082

# Conexión MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/valle_del_sol_reportes?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=tu_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración Kafka (Ajustar según el servidor de tu compañero)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer